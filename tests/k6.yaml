apiVersion: v1
kind: Pod
metadata:
  name: k6
spec:
  restartPolicy: Never
  containers:
    - name: k6
      image: grafana/k6
      command: [ "k6", "run", "/scripts/load-test.js" ]
      volumeMounts:
        - name: script
          mountPath: /scripts
  volumes:
    - name: script
      configMap:
        name: k6-script
