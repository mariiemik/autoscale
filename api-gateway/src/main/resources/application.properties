spring.application.name=api-gateway
# =======================================================
# API GATEWAY CORE CONFIGURATION
# =======================================================
server.port=8080
# EUREKA CLIENT CONFIGURATION
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
# ????????? ?????????????? LOCATOR (?? ????? ????????????? ? ?????? ??????????)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false
# =======================================================
# ????? ???????? (EXPLICIT ROUTES)
# =======================================================
# 0. USER SERVICE (http://localhost:8080/api/users/**)
spring.cloud.gateway.server.webflux.routes[0].id=user_route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**
# ??????: ??????? ?????? ??????? (/api), ????? ?????? ??????? /users/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1
# 1. ORDER SERVICE (http://localhost:8080/api/orders/**)
spring.cloud.gateway.server.webflux.routes[1].id=order_route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/orders/**
# ??????: ??????? ?????? ??????? (/api), ????? ?????? ??????? /orders/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1
