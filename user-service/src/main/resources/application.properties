spring.application.name=user-service
# 1. ?????????? ???? ??? ????? ???????
server.port=8088
# 3. Eureka Client: ?????, ??? ????????? Eureka Server
#    ?????: ????? ????????? ?????, ??? ??????? Eureka Server (8761)
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
# 4. ????????? Eureka ???????????????? ? ???????? ?????? (default: true)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# PostgreSQL Configuration (user-db)
# ?????????? ???? 5434, ???????????? ? docker-compose
spring.datasource.url=jdbc:postgresql://localhost:5434/user
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# ???????? SQL ? ??????? (??? ??????)
spring.jpa.show-sql=true
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
#spring.flyway.url=jdbc:postgresql://localhost:5434/user
#spring.flyway.user=postgres
#spring.flyway.password=postgres
#spring.flyway.schemas=public
spring.data.redis.host=127.0.0.1
#spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2s
spring.cache.type=redis
management.endpoints.web.exposure.include=health,info,prometheus, beans, metrics
management.endpoint.prometheus.enabled=true
# ???????? ???? ?????????? ?????? Redis (latency, ??????)
management.metrics.enable.io.micrometer.redis=true
management.metrics.enable.cache=true
management.metrics.enable.redis=true
app.cache.names=users
#??? ??????? ? common
# ????????? ??? ??????? ??? ????? ????? (label) ?? ???? ???????? Micrometer
management.metrics.tags.application=${spring.application.name}

